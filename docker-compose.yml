services:
  proposal-manager:
    build: .
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    # Use the host's network stack directly. This bypasses the Docker bridge
    # NAT/MASQUERADE pipeline entirely — outbound API calls (Anthropic, etc.)
    # go out exactly as they would from the host itself. Chosen because the
    # host's iptables/nftables rules for Docker bridges drift after firewall
    # reloads and silently break container egress; host networking has no
    # such dependency. The app binds directly to 127.0.0.1:${HOST_PORT}
    # (default 15010) where nginx proxies to it.
    network_mode: host
    command: >
      gunicorn
      --bind 127.0.0.1:${HOST_PORT:-15010}
      --workers 2
      --timeout 900
      --graceful-timeout 900
      --keep-alive 75
      app:app
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./generated_proposals:/app/generated_proposals
      - ./templates:/app/templates
      - ./reference_documents:/app/reference_documents
      - ./config:/app/config
      - ./data:/app/data

  triage-worker:
    build: .
    restart: unless-stopped
    # Runs the pre-proposal triage queue. Polls the SQLite-backed
    # triage_jobs table and processes per-document analysis tasks. Sharing
    # the host network keeps DB access (sqlite file mount) and outbound
    # Anthropic API egress simple.
    network_mode: host
    command: ["python", "triage_worker.py"]
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./generated_proposals:/app/generated_proposals
      - ./templates:/app/templates
      - ./reference_documents:/app/reference_documents
      - ./config:/app/config
      - ./data:/app/data
    depends_on:
      - proposal-manager
