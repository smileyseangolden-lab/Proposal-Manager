services:
  proposal-manager:
    build: .
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    # Disable IPv6 inside the container. The Docker bridge network is IPv4-only
    # (no ip6tables MASQUERADE rule on this host), so any AAAA record resolution
    # leads to "Network is unreachable" and the Anthropic SDK reports it as
    # "Connection error." Forcing IPv4-only DNS avoids that entirely.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    ports:
      # Published on loopback only — nginx reverse-proxies the public port here.
      # Override via HOST_PORT in .env (default 15010 avoids a stuck dockerd
      # reservation seen on 15000). If you change this, also update nginx's
      # proxy_pass (see README deployment notes).
      - "127.0.0.1:${HOST_PORT:-15010}:5000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./generated_proposals:/app/generated_proposals
      - ./templates:/app/templates
      - ./reference_documents:/app/reference_documents
      - ./config:/app/config
      - ./data:/app/data
