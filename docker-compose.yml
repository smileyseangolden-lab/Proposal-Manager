services:
  proposal-manager:
    build: .
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    ports:
      - "127.0.0.1:${HOST_PORT:-15000}:5000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./generated_proposals:/app/generated_proposals
      - ./templates:/app/templates
      - ./reference_documents:/app/reference_documents
      - ./config:/app/config
      - ./data:/app/data
