services:
  proposal-manager:
    build: .
    restart: unless-stopped
    # Note: the container runs as non-root (uid 10001, see Dockerfile). The
    # bind-mounted host directories below must be writable by that uid, e.g.
    #   sudo chown -R 10001:10001 uploads generated_proposals data
    # Use the host's network stack directly. This bypasses the Docker bridge
    # NAT/MASQUERADE pipeline entirely — outbound API calls (Anthropic, etc.)
    # go out exactly as they would from the host itself. Chosen because the
    # host's iptables/nftables rules for Docker bridges drift after firewall
    # reloads and silently break container egress; host networking has no
    # such dependency. The app binds directly to 127.0.0.1:${HOST_PORT}
    # (default 15010) where nginx proxies to it.
    network_mode: host
    command: >
      gunicorn
      --bind 127.0.0.1:${HOST_PORT:-15010}
      --worker-class gthread
      --workers ${WEB_WORKERS:-2}
      --threads ${WEB_THREADS:-8}
      --timeout 600
      --graceful-timeout 30
      --keep-alive 75
      app:app
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./generated_proposals:/app/generated_proposals
      - ./templates:/app/templates
      - ./reference_documents:/app/reference_documents
      - ./config:/app/config
      - ./data:/app/data
