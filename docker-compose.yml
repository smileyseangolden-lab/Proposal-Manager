services:
  proposal-manager:
    build: .
    restart: unless-stopped
    security_opt:
      - apparmor:unconfined
    ports:
      # Published on loopback only — nginx reverse-proxies the public port here.
      # Moved from 15000 to 15010 to sidestep a stuck dockerd port reservation.
      # If you change this, also update nginx's proxy_pass (see README deployment notes).
      - "127.0.0.1:15010:5000"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./generated_proposals:/app/generated_proposals
      - ./templates:/app/templates
      - ./reference_documents:/app/reference_documents
      - ./config:/app/config
      - ./data:/app/data
