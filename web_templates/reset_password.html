<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password &mdash; {{ app_name }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/pm-logo-mark.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <img src="{{ url_for('static', filename='img/pm-logo-full.svg') }}" alt="{{ app_name }}">
            <p class="auth-tagline">AI-Powered Proposal Platform</p>
        </div>
        <div class="auth-card">
            <h2 class="auth-heading">Set a new password</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}{% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('reset_password', token=token) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="password">New Password <span class="form-hint">(min 8 characters)</span></label>
                    <input type="password" id="password" name="password" required minlength="8" autofocus autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary btn-large" style="background: var(--sea-800);">Update password</button>
            </form>
            <p class="auth-footer"><a href="{{ url_for('login') }}">Back to sign in</a></p>
        </div>
        <p class="auth-below">{{ app_footer }}</p>
    </div>
</body>
</html>
