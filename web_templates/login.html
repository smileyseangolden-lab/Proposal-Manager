<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In &mdash; {{ app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <img src="{{ url_for('static', filename='img/etg-logo-full.svg') }}" alt="{{ app_company }}" class="auth-logo">
            <h1 class="auth-title">{{ app_name }}</h1>
            <p class="auth-subtitle">Log in to your account</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="post" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrap">
                        <input type="password" id="password" name="password" required>
                        <button type="button" class="password-toggle" id="toggle-pw" aria-label="Show password">
                            <svg class="eye-icon eye-open" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-icon eye-closed" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Log In</button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
        </div>
    </div>
    <script>
    (function(){
        var btn = document.getElementById("toggle-pw");
        var pw = document.getElementById("password");
        var open = btn.querySelector(".eye-open");
        var closed = btn.querySelector(".eye-closed");
        btn.addEventListener("click", function(){
            var show = pw.type === "password";
            pw.type = show ? "text" : "password";
            open.style.display = show ? "none" : "";
            closed.style.display = show ? "" : "none";
            btn.setAttribute("aria-label", show ? "Hide password" : "Show password");
        });
    })();
    </script>
</body>
</html>
