{% extends "base.html" %}

{% block title %}FAQ &mdash; {{ app_name }}{% endblock %}

{% block content %}
<section class="page-header">
    <h1>Frequently Asked Questions</h1>
    <p class="page-subtitle">Everything you need to know about using {{ app_name }}</p>
</section>

<div class="faq-list">
    {% for faq in faqs %}
    <div class="faq-item">
        <button class="faq-question" onclick="this.parentElement.classList.toggle('open')">
            {{ faq.q }}
            <span class="faq-toggle">+</span>
        </button>
        <div class="faq-answer">{{ faq.a }}</div>
    </div>
    {% endfor %}
</div>
{% endblock %}
